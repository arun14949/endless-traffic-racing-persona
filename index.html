<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Road Rash Rush</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; touch-action:none; user-select:none; }
canvas { display:block; }

#ui-layer {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10;
}
#ui-layer > div { pointer-events:auto; }

/* SPLASH SCREEN */
#splash-screen {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; transition: opacity 0.8s;
}
#splash-screen.hidden { opacity:0; pointer-events:none; }

.splash-title {
  font-family:'Orbitron',monospace; font-size:clamp(2.5rem,8vw,5rem);
  font-weight:900; color:#fff; text-align:center;
  text-shadow: 0 0 40px rgba(255,60,60,0.8), 0 0 80px rgba(255,60,60,0.4);
  animation: titlePulse 2s ease-in-out infinite;
  letter-spacing:4px;
}
.splash-subtitle {
  font-family:'Rajdhani',sans-serif; font-size:clamp(0.9rem,3vw,1.4rem);
  color:rgba(255,255,255,0.5); margin-top:8px; letter-spacing:6px; text-transform:uppercase;
}
.splash-btn {
  margin-top:50px; padding:16px 60px; font-family:'Orbitron',monospace;
  font-size:clamp(1rem,3vw,1.3rem); font-weight:700; color:#fff;
  background: linear-gradient(135deg,#e63946,#c1121f); border:2px solid #ff4d5a;
  border-radius:50px; cursor:pointer; letter-spacing:3px;
  transition: all 0.3s; text-transform:uppercase;
  box-shadow: 0 0 30px rgba(230,57,70,0.4);
}
.splash-btn:hover { transform:scale(1.05); box-shadow: 0 0 50px rgba(230,57,70,0.7); }
.splash-btn:active { transform:scale(0.97); }
@keyframes titlePulse {
  0%,100% { text-shadow: 0 0 40px rgba(255,60,60,0.8), 0 0 80px rgba(255,60,60,0.4); }
  50% { text-shadow: 0 0 60px rgba(255,60,60,1), 0 0 120px rgba(255,60,60,0.6); }
}
.road-lines-bg {
  position:absolute; bottom:0; left:0; width:100%; height:40%;
  background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 42px);
  animation: roadScroll 1s linear infinite;
}
@keyframes roadScroll { 0%{transform:translateY(0)} 100%{transform:translateY(42px)} }

/* CHARACTER SELECT */
#char-select {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
  display:none; flex-direction:column; align-items:center;
  z-index:90; overflow-y:auto; padding:20px;
}
#char-select.active { display:flex; }
#char-select.hidden { opacity:0; pointer-events:none; transition:opacity 0.5s; }

.select-title {
  font-family:'Orbitron',monospace; font-size:clamp(1.4rem,4vw,2.2rem);
  color:#fff; margin:20px 0 10px; letter-spacing:3px; font-weight:700;
}
.select-sub { color:rgba(255,255,255,0.4); font-size:0.95rem; margin-bottom:20px; letter-spacing:2px; }

.personas-grid {
  display:grid; grid-template-columns:repeat(2, 1fr);
  gap:12px; width:100%; max-width:1050px; padding:0 10px; box-sizing:border-box;
}
.persona-card {
  background: rgba(255,255,255,0.04); border:2px solid rgba(255,255,255,0.08);
  border-radius:16px; padding:14px 10px; text-align:center; cursor:pointer;
  transition:all 0.4s; position:relative; overflow:hidden; min-width:0;
}
.persona-card:hover { border-color:rgba(255,255,255,0.25); transform:translateY(-4px); }
.persona-card.selected { border-color:#e63946; background:rgba(230,57,70,0.1);
  box-shadow: 0 0 30px rgba(230,57,70,0.3); }

.persona-preview {
  width:100%; height:clamp(110px,22vw,160px); border-radius:10px;
  background:rgba(0,0,0,0.3); margin-bottom:8px; position:relative; overflow:hidden;
}
.persona-preview canvas { width:100%!important; height:100%!important; border-radius:10px; }

.persona-name { font-family:'Orbitron',monospace; font-size:clamp(0.85rem,2.5vw,1.1rem); color:#fff; font-weight:700; }
.persona-vehicle { color:rgba(255,255,255,0.5); font-size:clamp(0.7rem,2vw,0.85rem); margin-top:4px; line-height:1.3; }
.persona-stats { display:flex; justify-content:center; gap:8px; margin-top:10px; }
.stat { text-align:center; flex:1; min-width:0; }
.stat-label { font-size:0.6rem; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stat-bar { width:100%; max-width:60px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin:3px auto 0; }
.stat-fill { height:100%; border-radius:2px; background:#e63946; }

.start-race-btn {
  margin:24px 0 30px; padding:14px 50px; font-family:'Orbitron',monospace;
  font-size:1.1rem; font-weight:700; color:#fff;
  background:linear-gradient(135deg,#e63946,#c1121f); border:2px solid #ff4d5a;
  border-radius:50px; cursor:pointer; letter-spacing:2px;
  transition:all 0.3s; opacity:0.3; pointer-events:none;
}
.start-race-btn.ready { opacity:1; pointer-events:auto; }
.start-race-btn.ready:hover { transform:scale(1.05); box-shadow:0 0 40px rgba(230,57,70,0.5); }

/* HUD */
#hud {
  position:absolute; top:0; left:0; width:100%; padding:12px 16px;
  display:none; justify-content:space-between; align-items:flex-start;
  z-index:50; pointer-events:none;
}
#hud.active { display:flex; }

.hud-left, .hud-right { display:flex; flex-direction:column; gap:4px; }
.hud-right { align-items:flex-end; }

.hud-score {
  font-family:'Orbitron',monospace; font-size:clamp(1.2rem,4vw,2rem);
  color:#fff; font-weight:900; text-shadow:0 2px 10px rgba(0,0,0,0.7);
}
.hud-label {
  font-size:clamp(0.6rem,2vw,0.75rem); color:rgba(255,255,255,0.5);
  text-transform:uppercase; letter-spacing:2px;
}
.hud-speed {
  font-family:'Orbitron',monospace; font-size:clamp(1rem,3vw,1.4rem);
  color:#e63946; font-weight:700;
}
.hud-highscore {
  font-family:'Orbitron',monospace; font-size:clamp(0.7rem,2vw,0.9rem);
  color:rgba(255,200,50,0.8); font-weight:600;
}

/* GAME OVER */
#game-over {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0); display:none; flex-direction:column;
  align-items:center; justify-content:center; z-index:80;
  transition: background 1s;
}
#game-over.active { display:flex; background:rgba(0,0,0,0.75); }

.go-title {
  font-family:'Orbitron',monospace; font-size:clamp(2rem,7vw,4rem);
  font-weight:900; color:#e63946; letter-spacing:4px;
  text-shadow:0 0 40px rgba(230,57,70,0.6);
  animation: goShake 0.5s ease-out;
}
@keyframes goShake {
  0%,100%{transform:translate(0)} 10%{transform:translate(-8px,4px)}
  20%{transform:translate(6px,-4px)} 30%{transform:translate(-4px,2px)}
  40%{transform:translate(4px,-2px)} 50%{transform:translate(-2px,1px)}
}
.go-stats {
  margin-top:24px; display:flex; gap:30px;
}
.go-stat { text-align:center; }
.go-stat-value {
  font-family:'Orbitron',monospace; font-size:clamp(1.4rem,5vw,2.4rem);
  color:#fff; font-weight:900;
}
.go-stat-label {
  font-size:0.75rem; color:rgba(255,255,255,0.4); text-transform:uppercase;
  letter-spacing:2px; margin-top:4px;
}
.go-new-best {
  color:#ffd700; font-family:'Orbitron',monospace; font-size:0.9rem;
  margin-top:10px; animation: bestPulse 1s infinite;
}
@keyframes bestPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.go-buttons { margin-top:30px; display:flex; gap:14px; }
.go-btn {
  padding:12px 36px; font-family:'Orbitron',monospace; font-size:0.9rem;
  font-weight:700; border-radius:50px; cursor:pointer; letter-spacing:2px;
  transition:all 0.3s; border:2px solid;
}
.go-btn-retry { color:#fff; background:linear-gradient(135deg,#e63946,#c1121f); border-color:#ff4d5a; }
.go-btn-menu { color:#fff; background:transparent; border-color:rgba(255,255,255,0.3); }
.go-btn:hover { transform:scale(1.05); }

/* MOBILE CONTROLS */
#mobile-controls {
  position:absolute; bottom:20px; left:0; width:100%;
  display:none; justify-content:center; gap:20px; z-index:60;
}
.mobile-btn {
  width:70px; height:70px; border-radius:50%;
  background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; color:rgba(255,255,255,0.6);
  -webkit-tap-highlight-color:transparent;
  transition: background 0.15s;
}
.mobile-btn:active { background:rgba(255,255,255,0.25); }

#speed-lines {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:5; opacity:0; transition:opacity 0.3s;
}

@media (max-width:768px) {
  .personas-grid { grid-template-columns:repeat(2, 1fr); gap:10px; }
  .persona-preview { height:120px; }
  #mobile-controls { display:flex; }
}
@media (max-width:480px) {
  .personas-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<div id="ui-layer">
  <!-- SPLASH SCREEN -->
  <div id="splash-screen">
    <div class="road-lines-bg"></div>
    <div class="splash-title">ROAD RASH<br>RUSH</div>
    <div class="splash-subtitle">Endless Traffic Racing</div>
    <button class="splash-btn" onclick="showCharSelect()">PLAY</button>
  </div>

  <!-- CHARACTER SELECT -->
  <div id="char-select">
    <div class="select-title">CHOOSE YOUR RIDE</div>
    <div class="select-sub">Tap a vehicle to preview • Swipe to rotate</div>
    <div class="personas-grid" id="persona-grid"></div>
    <button class="start-race-btn" id="start-btn" onclick="startGame()">START RACE</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <div class="hud-label">Score</div>
      <div class="hud-score" id="hud-score">0</div>
      <div class="hud-label">Distance</div>
      <div class="hud-score" id="hud-dist" style="font-size:clamp(0.9rem,3vw,1.3rem);color:#aaa;">0m</div>
    </div>
    <div class="hud-right">
      <div class="hud-label">Speed</div>
      <div class="hud-speed" id="hud-speed">0 km/h</div>
      <div class="hud-label">Best</div>
      <div class="hud-highscore" id="hud-high">0</div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="game-over">
    <div class="go-title">WRECKED!</div>
    <div class="go-stats">
      <div class="go-stat"><div class="go-stat-value" id="go-score">0</div><div class="go-stat-label">Score</div></div>
      <div class="go-stat"><div class="go-stat-value" id="go-dist">0m</div><div class="go-stat-label">Distance</div></div>
    </div>
    <div class="go-new-best" id="go-best" style="display:none">★ NEW HIGH SCORE ★</div>
    <div class="go-buttons">
      <button class="go-btn go-btn-retry" onclick="retryGame()">RETRY</button>
      <button class="go-btn go-btn-menu" onclick="goToMenu()">MENU</button>
    </div>
  </div>

  <!-- MOBILE -->
  <div id="mobile-controls">
    <div class="mobile-btn" ontouchstart="inputLeft()" onmousedown="inputLeft()">◀</div>
    <div class="mobile-btn" ontouchstart="inputRight()" onmousedown="inputRight()">▶</div>
  </div>

  <canvas id="speed-lines"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="sound.js"></script>
<script>

// ============ PERSONAS ============
const PERSONAS = [
  { id:0, name:'Arun', vehicle:'Ruby Red Ford Freestyle', color:0xcc2233, bodyColor:0xcc2233,
    speed:1, handling:0.8, accel:0.85, engineFreq:85, type:'suv' },
  { id:1, name:'Sankar', vehicle:'Red Volkswagen Polo', color:0xdd3333, bodyColor:0xdd3333,
    speed:0.85, handling:0.95, accel:0.9, engineFreq:110, type:'hatch' },
  { id:2, name:'James', vehicle:'Black Hyundai i20', color:0x222222, bodyColor:0x1a1a1a,
    speed:0.9, handling:0.9, accel:0.95, engineFreq:100, type:'hatch2' },
  { id:3, name:'Nizam', vehicle:'Blue TVS Jupiter', color:0x2266cc, bodyColor:0x2255bb,
    speed:0.55, handling:1.0, accel:0.8, engineFreq:160, type:'scooter' }
];

let selectedPersona = -1;
let previewScenes = [];

// ============ 3D VEHICLE BUILDERS ============
function buildVehicle3D(type, color, isPreview=false){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color, metalness:0.65, roughness:0.25});
  const darkMat = new THREE.MeshStandardMaterial({color:0x111111, metalness:0.3, roughness:0.7});
  const glassMat = new THREE.MeshStandardMaterial({color:0x88ccff, metalness:0.9, roughness:0.05, transparent:true, opacity:0.45});
  const chromeMat = new THREE.MeshStandardMaterial({color:0xdddddd, metalness:0.97, roughness:0.03});
  const lightMatF = new THREE.MeshStandardMaterial({color:0xffffdd, emissive:0xffffaa, emissiveIntensity:0.6});
  const lightMatR = new THREE.MeshStandardMaterial({color:0xff1100, emissive:0xff0800, emissiveIntensity:0.7});
  const rubberMat = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.9, metalness:0.05});
  const rimMat = new THREE.MeshStandardMaterial({color:0xaaaaaa, metalness:0.9, roughness:0.1});
  const interiorMat = new THREE.MeshStandardMaterial({color:0x222222, roughness:0.8});
  const grillMat = new THREE.MeshStandardMaterial({color:0x0a0a0a, roughness:0.5, metalness:0.4});
  const underMat = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.9});

  function makeWheel(radius, width, rimColor){
    const wg = new THREE.Group();
    // Tire
    const tire = new THREE.Mesh(new THREE.TorusGeometry(radius, radius*0.35, 12, 24), rubberMat);
    tire.rotation.y=Math.PI/2;
    wg.add(tire);
    // Rim disc
    const rim = new THREE.Mesh(new THREE.CylinderGeometry(radius*0.65, radius*0.65, width*0.6, 16), 
      new THREE.MeshStandardMaterial({color:rimColor||0xaaaaaa, metalness:0.92, roughness:0.08}));
    rim.rotation.z=Math.PI/2;
    wg.add(rim);
    // Rim spokes
    for(let i=0;i<5;i++){
      const spoke=new THREE.Mesh(new THREE.BoxGeometry(width*0.5,radius*0.12,radius*1.1),
        new THREE.MeshStandardMaterial({color:rimColor||0xaaaaaa,metalness:0.9,roughness:0.1}));
      spoke.rotation.x=i*(Math.PI/5);
      wg.add(spoke);
    }
    // Hub
    const hub=new THREE.Mesh(new THREE.CylinderGeometry(radius*0.18,radius*0.18,width*0.7,12),
      new THREE.MeshStandardMaterial({color:0x333333,metalness:0.8,roughness:0.15}));
    hub.rotation.z=Math.PI/2;
    wg.add(hub);
    return wg;
  }

  function addWheelArch(parent, x, z, w, h, bodyMat){
    const arch=new THREE.Mesh(new THREE.BoxGeometry(0.08, h*0.4, w*1.1), bodyMat);
    arch.position.set(x>0?x+0.04:x-0.04, h*0.55, z);
    parent.add(arch);
  }

  if(type==='scooter'){
    // === SUZUKI JUPITER SCOOTER - Blue ===
    // Main body / legshield
    const legShield = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.65,0.5), mat);
    legShield.position.set(0,0.55,0.4); g.add(legShield);
    // Curved top of legshield
    const legTop=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.55,12,1,false,0,Math.PI),mat);
    legTop.rotation.z=Math.PI/2; legTop.rotation.y=-Math.PI/2;
    legTop.position.set(0,0.88,0.4); g.add(legTop);

    // Floorboard
    const floor=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.08,1.0), new THREE.MeshStandardMaterial({color:0x222222,roughness:0.8}));
    floor.position.set(0,0.28,0); g.add(floor);

    // Rear body / engine cover
    const rearBody=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.5,1.1), mat);
    rearBody.position.set(0,0.52,-0.55); g.add(rearBody);
    // Rear body taper
    const rearTaper=new THREE.Mesh(new THREE.BoxGeometry(0.48,0.35,0.3), mat);
    rearTaper.position.set(0,0.62,-1.05); g.add(rearTaper);

    // Seat - long with slight taper
    const seatBase=new THREE.Mesh(new THREE.BoxGeometry(0.42,0.1,1.0), new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.6}));
    seatBase.position.set(0,0.82,-0.35); g.add(seatBase);
    const seatCushion=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.06,0.9), new THREE.MeshStandardMaterial({color:0x222222,roughness:0.4}));
    seatCushion.position.set(0,0.88,-0.35); g.add(seatCushion);

    // Grab rail
    const grabL=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.04,0.3), chromeMat);
    grabL.position.set(-0.22,0.85,-0.8); g.add(grabL);
    const grabR=grabL.clone(); grabR.position.x=0.22; g.add(grabR);
    const grabBack=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.04,0.04), chromeMat);
    grabBack.position.set(0,0.85,-0.95); g.add(grabBack);

    // Handlebar assembly
    const steeringCol=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.5,8), new THREE.MeshStandardMaterial({color:0x333333,metalness:0.5}));
    steeringCol.position.set(0,0.75,0.65); steeringCol.rotation.x=-0.2; g.add(steeringCol);
    const hbar=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.7,8), chromeMat);
    hbar.rotation.z=Math.PI/2; hbar.position.set(0,1.02,0.72); g.add(hbar);
    // Grips
    const gripL=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.12,8), rubberMat);
    gripL.rotation.z=Math.PI/2; gripL.position.set(-0.38,1.02,0.72); g.add(gripL);
    const gripR=gripL.clone(); gripR.position.x=0.38; g.add(gripR);
    // Mirrors
    const mirStemL=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,0.18,6), chromeMat);
    mirStemL.position.set(-0.35,1.12,0.72); g.add(mirStemL);
    const mirL=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.01,0.06), new THREE.MeshStandardMaterial({color:0x444444,metalness:0.8}));
    mirL.position.set(-0.35,1.21,0.72); g.add(mirL);
    const mirStemR=mirStemL.clone(); mirStemR.position.x=0.35; g.add(mirStemR);
    const mirR=mirL.clone(); mirR.position.x=0.35; g.add(mirR);

    // Instrument cluster / console
    const console2=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.15,0.12), new THREE.MeshStandardMaterial({color:0x111111}));
    console2.position.set(0,0.97,0.6); g.add(console2);
    const consoleFace=new THREE.Mesh(new THREE.BoxGeometry(0.24,0.1,0.01), new THREE.MeshStandardMaterial({color:0x003355,emissive:0x001122,emissiveIntensity:0.3}));
    consoleFace.position.set(0,0.97,0.66); g.add(consoleFace);

    // Headlight - large round
    const hlHousing=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.16,0.08,16), chromeMat);
    hlHousing.rotation.x=Math.PI/2; hlHousing.position.set(0,0.78,0.68); g.add(hlHousing);
    const hlLens=new THREE.Mesh(new THREE.CircleGeometry(0.13,16), lightMatF);
    hlLens.position.set(0,0.78,0.72); g.add(hlLens);

    // Taillight - wide red bar
    const tlHousing=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.08,0.04), new THREE.MeshStandardMaterial({color:0x330000}));
    tlHousing.position.set(0,0.65,-1.18); g.add(tlHousing);
    const tlLens=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.06,0.02), lightMatR);
    tlLens.position.set(0,0.65,-1.2); g.add(tlLens);

    // Turn indicators
    const indL=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.04,0.03), new THREE.MeshStandardMaterial({color:0xffaa00,emissive:0xff8800,emissiveIntensity:0.3}));
    indL.position.set(-0.2,0.62,-1.18); g.add(indL);
    const indR=indL.clone(); indR.position.x=0.2; g.add(indR);

    // Front fork
    const forkL=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.025,0.6,8), chromeMat);
    forkL.position.set(-0.08,0.42,0.78); forkL.rotation.x=0.1; g.add(forkL);
    const forkR=forkL.clone(); forkR.position.x=0.08; g.add(forkR);

    // Front fender / mudguard
    const fMudguard=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.35,12,1,false,0,Math.PI), mat);
    fMudguard.rotation.z=Math.PI/2; fMudguard.position.set(0,0.3,0.78); g.add(fMudguard);

    // Rear fender
    const rMudguard=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.06,0.5), mat);

function setupPreviewCards(){
  const grid = document.getElementById('persona-grid');
  grid.innerHTML='';
  PERSONAS.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className='persona-card';
    card.dataset.id=i;
    card.innerHTML=`
      <div class="persona-preview"><canvas id="preview-${i}"></canvas></div>
      <div class="persona-name">${p.name}</div>
      <div class="persona-vehicle">${p.vehicle}</div>
      <div class="persona-stats">
        <div class="stat"><div class="stat-label">Speed</div><div class="stat-bar"><div class="stat-fill" style="width:${p.speed*100}%"></div></div></div>
        <div class="stat"><div class="stat-label">Handle</div><div class="stat-bar"><div class="stat-fill" style="width:${p.handling*100}%"></div></div></div>
        <div class="stat"><div class="stat-label">Accel</div><div class="stat-bar"><div class="stat-fill" style="width:${p.accel*100}%"></div></div></div>
      </div>`;
    card.onclick=()=>selectPersona(i);
    grid.appendChild(card);

    // Mini 3D preview
    const canvas=document.getElementById(`preview-${i}`);
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    const scene=new THREE.Scene();
    const cam=new THREE.PerspectiveCamera(40,canvas.clientWidth/canvas.clientHeight,0.1,50);
    cam.position.set(3,2.5,3);
    cam.lookAt(0,0.4,0);
    scene.add(new THREE.AmbientLight(0xffffff,0.6));
    const dl=new THREE.DirectionalLight(0xffffff,0.8);
    dl.position.set(3,5,3); scene.add(dl);
    const vehicle = buildVehicle3D(p.type, p.bodyColor, true);
    scene.add(vehicle);
    // Ground
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshStandardMaterial({color:0x1a1a1a}));
    ground.rotation.x=-Math.PI/2; scene.add(ground);

    previewScenes.push({renderer,scene,cam,vehicle,canvas,rotY:0,dragging:false,lastX:0});
  });

  // Drag to rotate
  previewScenes.forEach((ps,i)=>{
    const cv=ps.canvas;
    const onDown=(x)=>{ps.dragging=true;ps.lastX=x;};
    const onMove=(x)=>{if(ps.dragging){ps.rotY+=(x-ps.lastX)*0.01;ps.lastX=x;}};
    const onUp=()=>{ps.dragging=false;};
    cv.addEventListener('mousedown',e=>{e.stopPropagation();onDown(e.clientX);});
    cv.addEventListener('mousemove',e=>onMove(e.clientX));
    cv.addEventListener('mouseup',onUp);
    cv.addEventListener('touchstart',e=>{e.stopPropagation();onDown(e.touches[0].clientX);},{passive:true});
    cv.addEventListener('touchmove',e=>onMove(e.touches[0].clientX),{passive:true});
    cv.addEventListener('touchend',onUp);
  });

  animatePreviews();
}

function animatePreviews(){
  requestAnimationFrame(animatePreviews);
  previewScenes.forEach(ps=>{
    if(!ps.dragging) ps.rotY+=0.008;
    ps.vehicle.rotation.y=ps.rotY;
    const w=ps.canvas.clientWidth, h=ps.canvas.clientHeight;
    if(ps.canvas.width!==w||ps.canvas.height!==h){
      ps.renderer.setSize(w,h,false);
      ps.cam.aspect=w/h; ps.cam.updateProjectionMatrix();
    }
    ps.renderer.render(ps.scene,ps.cam);
  });
}

  const roadMat=new THREE.MeshStandardMaterial({color:0x333333, roughness:0.9});
  const dividerMat=new THREE.MeshStandardMaterial({color:0x1a8a1a, roughness:0.7});
  const sidewalkMat=new THREE.MeshStandardMaterial({color:0x999988, roughness:0.8});

  for(let i=0;i<8;i++){
    // Road segment
    const rg=new THREE.Mesh(new THREE.PlaneGeometry(12,30), roadMat);
    rg.rotation.x=-Math.PI/2; rg.position.set(0,0, i*30-30);
    rg.receiveShadow=true;
    scene.add(rg); road.push(rg);

    // Lane markings (dashed white) - between lanes
    for(let j=0;j<10;j++){
      const mkL=new THREE.Mesh(new THREE.PlaneGeometry(0.15,1.8),
        new THREE.MeshStandardMaterial({color:0xffffff}));
      mkL.rotation.x=-Math.PI/2; mkL.position.set(-LANE_WIDTH/2, 0.01, i*30-30+j*3-12);
      scene.add(mkL); roadMarkings.push(mkL);
      const mkR=mkL.clone();
      mkR.position.x=LANE_WIDTH/2;
      scene.add(mkR); roadMarkings.push(mkR);
    }

    // Side dividers
    const sdL=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,30), dividerMat);
    sdL.position.set(-6.3,0.15,i*30-30); scene.add(sdL); road.push(sdL);
    const sdR=sdL.clone(); sdR.position.x=6.3; scene.add(sdR); road.push(sdR);

    // Sidewalks
    const swL=new THREE.Mesh(new THREE.BoxGeometry(4,0.2,30), sidewalkMat);
    swL.position.set(-8.5,0.1,i*30-30); swL.receiveShadow=true; scene.add(swL); road.push(swL);
    const swR=swL.clone(); swR.position.x=8.5; scene.add(swR); road.push(swR);

    // Road edge lines (solid yellow)
    const elL=new THREE.Mesh(new THREE.PlaneGeometry(0.2,30),
      new THREE.MeshStandardMaterial({color:0xffcc00}));
    elL.rotation.x=-Math.PI/2; elL.position.set(-LANE_WIDTH*1.5-0.3,0.01,i*30-30);
    scene.add(elL); roadMarkings.push(elL);
    const elR=elL.clone(); elR.position.x=LANE_WIDTH*1.5+0.3; scene.add(elR); roadMarkings.push(elR);
  }

  // Ground
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(200,400),
    new THREE.MeshStandardMaterial({color:0x4a7c3f}));
  gnd.rotation.x=-Math.PI/2; gnd.position.y=-0.05;
  gnd.receiveShadow=true; scene.add(gnd);
}

function buildEnvironment(){
  const treeMat=new THREE.MeshStandardMaterial({color:0x2d7a2d});
  const trunkMat=new THREE.MeshStandardMaterial({color:0x6b3a1f});
  const bldgColors=[0x8899aa,0xaa8877,0x998877,0x7788aa,0xbbaa88];

  for(let i=0;i<30;i++){
    const side=(Math.random()>0.5)?1:-1;
    const z=i*8-40;

    if(Math.random()>0.4){
      // Tree
      const tree=new THREE.Group();
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,1.5,6),trunkMat);
      trunk.position.y=0.75; tree.add(trunk);
      const foliage=new THREE.Mesh(new THREE.SphereGeometry(1.0+Math.random()*0.5,8,6),treeMat);
      foliage.position.y=2.2; tree.add(foliage);
      tree.position.set(side*(11+Math.random()*8),0,z);
      tree.castShadow=true;
      scene.add(tree);
    }
    if(Math.random()>0.6){
      const bc=bldgColors[Math.floor(Math.random()*bldgColors.length)];
      const bh=3+Math.random()*6;
      const bldg=new THREE.Mesh(new THREE.BoxGeometry(3+Math.random()*4,bh,4+Math.random()*3),
        new THREE.MeshStandardMaterial({color:bc,roughness:0.7}));
      bldg.position.set(side*(16+Math.random()*10),bh/2,z);
      bldg.castShadow=true;
      scene.add(bldg);
    }
  }
}

function spawnPlayer(){
  const p=PERSONAS[selectedPersona];
  playerGroup=new THREE.Group();
  player=buildVehicle3D(p.type, p.bodyColor);
  playerGroup.add(player);
  playerGroup.position.set(0,0,0);
  scene.add(playerGroup);
}

// ============ TRAFFIC SPAWNING ============
function spawnTraffic(){
  const types=['car','car','car','auto','ambulance','lorry','bus'];
  const type=types[Math.floor(Math.random()*types.length)];
  const lane=Math.floor(Math.random()*3);
  const v=buildTrafficVehicle(type);
  const spd = (8+Math.random()*8) * (1 + difficulty*0.08);
  const zPos = playerGroup.position.z + 80 + Math.random()*40;
  v.position.set(LANE_POSITIONS[lane], 0, zPos);
  v.userData={type, lane, speed:spd, passed:false};
  scene.add(v);
  traffic.push(v);
}

function spawnPothole(){
  const lane=Math.floor(Math.random()*3);
  const zPos=playerGroup.position.z+70+Math.random()*30;
  const ph=new THREE.Mesh(
    new THREE.CylinderGeometry(0.6,0.6,0.06,12),
    new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:1})
  );
  ph.position.set(LANE_POSITIONS[lane],0.01,zPos);
  ph.userData={lane,hit:false};
  scene.add(ph);
  potholes.push(ph);
  // Warning ring
  const ring=new THREE.Mesh(
    new THREE.RingGeometry(0.55,0.75,16),
    new THREE.MeshStandardMaterial({color:0xffaa00,side:THREE.DoubleSide})
  );
  ring.rotation.x=-Math.PI/2; ring.position.set(LANE_POSITIONS[lane],0.02,zPos);
  scene.add(ring);
  ph.userData.ring=ring;
}

// ============ SKID MARKS ============
function addSkidMark(x,z){
  const skid=new THREE.Mesh(
    new THREE.PlaneGeometry(0.15,1.5),
    new THREE.MeshStandardMaterial({color:0x111111,transparent:true,opacity:0.4})
  );
  skid.rotation.x=-Math.PI/2;
  skid.position.set(x,0.005,z);
  scene.add(skid);
  skidMarks.push({mesh:skid,life:3});
}

// ============ COLLISION ============
function checkCollisions(){
  const pp=playerGroup.position;
  const isScooter=PERSONAS[selectedPersona].type==='scooter';
  const pw=isScooter?0.4:0.7, pl=isScooter?0.8:1.7;

  for(let t of traffic){
    const tp=t.position;
    const tw=(t.userData.type==='bus'||t.userData.type==='lorry')?0.9:
             (t.userData.type==='ambulance')?0.8:
             (t.userData.type==='auto')?0.5:0.7;
    const tl=(t.userData.type==='bus')?3:(t.userData.type==='lorry')?2.5:
             (t.userData.type==='ambulance')?2:(t.userData.type==='auto')?0.8:1.5;

    const dx=Math.abs(pp.x-tp.x), dz=Math.abs(pp.z-tp.z);
    if(dx<(pw+tw) && dz<(pl+tl)){
      return t;
    }
    // Near-miss detection
    if(!t.userData.nearMissed && dx<(pw+tw+0.6) && dz<(pl+tl+0.5)){
      if(tp.z < pp.z){
        t.userData.nearMissed=true;
        playNearMiss();
      }
    }
  }

  for(let ph of potholes){
    if(ph.userData.hit) continue;
    const d=Math.sqrt((pp.x-ph.position.x)**2+(pp.z-ph.position.z)**2);
    if(d<1.0){
      ph.userData.hit=true;
      potholeSlowTimer=1.5;
      shakeIntensity=0.4;
      playPothole();
    }
  }

  return null;
}

function triggerCrash(trafficVehicle){
  crashed=true; gameState='over';
  playCrash();
  if(engineSound) engineSound.stop();
  stopSiren();
  shakeIntensity=1.0;

  // Crash animation - tilt player
  const crashAnim=()=>{
    if(gameOverTimer<1.5){
      player.rotation.x+=0.05;
      player.rotation.z+=0.03;
      player.position.y+=0.02;
      shakeIntensity=Math.max(0,1-gameOverTimer);
      requestAnimationFrame(crashAnim);
    }
  };
  crashAnim();

  // Save score
  if(score>highScore){
    highScore=score;
    localStorage.setItem('rr_highscore',highScore);
    setTimeout(()=>playHighScore(), 600);
  }

  setTimeout(()=>{
    document.getElementById('go-score').textContent=score;
    document.getElementById('go-dist').textContent=Math.floor(distance)+'m';
    document.getElementById('go-best').style.display=(score>=highScore&&score>0)?'block':'none';
    document.getElementById('game-over').classList.add('active');
  },1200);
}

// ============ INPUT ============
let touchStartX=0;
function inputLeft(){
  if(gameState!=='playing'||isChangingLane) return;
  if(currentLane<2){
    playLaneChange();
    prevLaneX=LANE_POSITIONS[currentLane];
    currentLane++;
    targetLaneX=LANE_POSITIONS[currentLane];
    isChangingLane=true; laneChangeProgress=0; laneChangeDir=-1;
    addSkidMark(playerGroup.position.x+0.3, playerGroup.position.z);
    addSkidMark(playerGroup.position.x-0.3, playerGroup.position.z);
  }
}
function inputRight(){
  if(gameState!=='playing'||isChangingLane) return;
  if(currentLane>0){
    playLaneChange();
    prevLaneX=LANE_POSITIONS[currentLane];
    currentLane--;
    targetLaneX=LANE_POSITIONS[currentLane];
    isChangingLane=true; laneChangeProgress=0; laneChangeDir=1;
    addSkidMark(playerGroup.position.x+0.3, playerGroup.position.z);
    addSkidMark(playerGroup.position.x-0.3, playerGroup.position.z);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a') inputLeft();
  if(e.key==='ArrowRight'||e.key==='d') inputRight();
});

document.addEventListener('touchstart',e=>{
  if(gameState!=='playing') return;
  touchStartX=e.touches[0].clientX;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(gameState!=='playing') return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>30){
    if(dx<0) inputLeft(); else inputRight();
  }
},{passive:true});

// ============ GAME LOOP ============
function gameLoop(){
  if(gameState==='over'&&gameOverTimer>3) return;
  requestAnimationFrame(gameLoop);

  const dt=Math.min(clock.getDelta(),0.05);
  if(gameState==='over') { gameOverTimer+=dt; }

  if(gameState==='playing'){
    // Difficulty
    difficulty=1+distance/200;

    // Speed
    const p=PERSONAS[selectedPersona];
    let targetSpeed=baseSpeed+difficulty*2;
    targetSpeed*=p.speed;
    if(potholeSlowTimer>0){
      potholeSlowTimer-=dt;
      targetSpeed*=0.5;
    }
    playerSpeed+=(targetSpeed-playerSpeed)*dt*2;
    playerSpeed=Math.min(playerSpeed,maxSpeed);

    // Move player forward
    playerGroup.position.z+=playerSpeed*dt;
    distance+=playerSpeed*dt;
    score=Math.floor(distance/2);

    // Lane change animation
    if(isChangingLane){
      const h=PERSONAS[selectedPersona].handling;
      laneChangeProgress+=dt*(4+h*3);
      if(laneChangeProgress>=1){
        laneChangeProgress=1; isChangingLane=false;
      }
      const t=laneChangeProgress;
      const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
      playerGroup.position.x=prevLaneX+(targetLaneX-prevLaneX)*ease;
      // Tilt during lane change
      player.rotation.z=-laneChangeDir*0.15*(1-Math.abs(2*t-1));
    } else {
      playerGroup.position.x+=(targetLaneX-playerGroup.position.x)*dt*10;
      player.rotation.z*=0.9;
    }

    // Camera follow
    camera.position.z=playerGroup.position.z-14;
    camera.position.x+=(playerGroup.position.x*0.3-camera.position.x)*dt*3;
    camera.lookAt(playerGroup.position.x*0.3, 0, playerGroup.position.z+20);

    // Camera shake
    if(shakeIntensity>0){
      camera.position.x+=(Math.random()-0.5)*shakeIntensity*0.5;
      camera.position.y+=((Math.random()-0.5)*shakeIntensity*0.3);
      shakeIntensity*=0.95;
      if(shakeIntensity<0.01) shakeIntensity=0;
    }

    // Engine sound
    if(engineSound){
      const f=PERSONAS[selectedPersona].engineFreq*(0.8+playerSpeed/maxSpeed*0.8);
      engineSound.setFreq(f);
    }

    // Spawn traffic
    spawnTimer+=dt;
    const spawnInterval=Math.max(0.4, 1.8-difficulty*0.12);
    if(spawnTimer>spawnInterval){
      spawnTimer=0;
      spawnTraffic();
      if(difficulty>2&&Math.random()>0.5) spawnTraffic();
    }

    // Spawn potholes
    potholeSpawnTimer+=dt;
    if(potholeSpawnTimer>Math.max(2,6-difficulty*0.3)){
      potholeSpawnTimer=0;
      spawnPothole();
    }

    // Move traffic & traffic sounds
    hornCooldown=Math.max(0, hornCooldown-dt);
    let hasAmbulance=false;
    traffic.forEach(t=>{
      t.position.z-=t.userData.speed*dt;
      // Whoosh when traffic passes player
      if(!t.userData.passed && t.position.z < playerGroup.position.z-3){
        t.userData.passed=true;
        playWhoosh(playerSpeed);
      }
      // Random horn from nearby traffic
      if(hornCooldown<=0 && !t.userData.honked && Math.abs(t.position.z-playerGroup.position.z)<15){
        if(Math.random()<0.003){
          t.userData.honked=true;
          playHorn(t.userData.type);
          hornCooldown=2.0;
        }
      }
      // Track ambulance proximity for siren
      if(t.userData.type==='ambulance' && Math.abs(t.position.z-playerGroup.position.z)<40){
        hasAmbulance=true;
      }
    });
    // Ambulance siren management
    if(hasAmbulance && !activeSiren){ startSiren(); activeSiren=true; }
    if(!hasAmbulance && activeSiren){ stopSiren(); activeSiren=false; }

    // Score milestones (every 100 points)
    const milestoneCheck=Math.floor(score/100);
    if(milestoneCheck>lastMilestone && score>0){
      lastMilestone=milestoneCheck;
      playMilestone();
    }

    // Check collision
    const hit=checkCollisions();
    if(hit) triggerCrash(hit);

    // Clean up distant objects
    traffic=traffic.filter(t=>{
      if(t.position.z<playerGroup.position.z-30){
        scene.remove(t); return false;
      }
      return true;
    });
    potholes=potholes.filter(p=>{
      if(p.position.z<playerGroup.position.z-30){
        scene.remove(p);
        if(p.userData.ring) scene.remove(p.userData.ring);
        return false;
      }
      return true;
    });

    // Skid marks
    skidMarks=skidMarks.filter(s=>{
      s.life-=dt;
      s.mesh.material.opacity=s.life/3*0.4;
      if(s.life<=0){scene.remove(s.mesh);return false;}
      return true;
    });

    // Infinite road - reposition segments
    road.forEach(r=>{
      if(r.position.z<playerGroup.position.z-50){
        r.position.z+=240;
      }
    });
    roadMarkings.forEach(m=>{
      if(m.position.z<playerGroup.position.z-50){
        m.position.z+=240;
      }
    });

    // HUD
    document.getElementById('hud-score').textContent=score;
    document.getElementById('hud-dist').textContent=Math.floor(distance)+'m';
    document.getElementById('hud-speed').textContent=Math.floor(playerSpeed*3.6)+' km/h';
    document.getElementById('hud-high').textContent=highScore;
  }

  // Speed lines
  drawSpeedLines();

  renderer.render(scene, camera);
}

function drawSpeedLines(){
  slCanvas.width=window.innerWidth;
  slCanvas.height=window.innerHeight;
  const spd=playerSpeed/maxSpeed;
  if(spd<0.6) { slCanvas.style.opacity=0; return; }
  slCanvas.style.opacity=(spd-0.6)*2;
  slCtx.clearRect(0,0,slCanvas.width,slCanvas.height);
  slCtx.strokeStyle='rgba(255,255,255,0.12)';
  slCtx.lineWidth=1;
  const cx=slCanvas.width/2, cy=slCanvas.height*0.3;
  for(let i=0;i<15;i++){
    const a=Math.random()*Math.PI*2;
    const r1=100+Math.random()*100;
    const r2=r1+100+Math.random()*200;
    slCtx.beginPath();
    slCtx.moveTo(cx+Math.cos(a)*r1, cy+Math.sin(a)*r1);
    slCtx.lineTo(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2);
    slCtx.stroke();
  }
}

function onResize(){
  if(!camera) return;
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

// ============ GAME FLOW ============
function startGame(){
  if(selectedPersona<0) return;
  initGame();
}

function retryGame(){
  cleanup();
  document.getElementById('game-over').classList.remove('active');
  initGame();
}

function goToMenu(){
  cleanup();
  document.getElementById('game-over').classList.remove('active');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('mobile-controls').style.display='none';
  document.getElementById('char-select').style.display='flex';
  document.getElementById('char-select').classList.remove('hidden');
  document.getElementById('char-select').classList.add('active');
  gameState='menu';
  selectedPersona=-1;
  document.querySelectorAll('.persona-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('start-btn').classList.remove('ready');
}

function cleanup(){
  if(engineSound) engineSound.stop();
  engineSound=null;
  stopSiren(); activeSiren=false;
  traffic.forEach(t=>scene.remove(t));
  traffic=[];
  potholes.forEach(p=>{scene.remove(p);if(p.userData.ring)scene.remove(p.userData.ring);});
  potholes=[];
  skidMarks.forEach(s=>scene.remove(s.mesh));
  skidMarks=[];
  if(renderer){
    document.body.removeChild(renderer.domElement);
    renderer.dispose();
  }
  scene=null; camera=null; renderer=null;
  gameOverTimer=0; crashed=false;
}
</script>
